# Development overrides — use with:
# docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  backend:
    build:
      context: ./backend
      target: dev
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --reload --host 0.0.0.0

  frontend:
    build:
      context: ./frontend
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

  bot-telegram:
    volumes:
      - ./bots/telegram:/app
    command: python -m main --reload
